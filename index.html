<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning Devi Ji 🌻</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
}

canvas{
position:absolute;
inset:0;
}

.message{
position:absolute;
left:50%;
bottom:5%;
transform:translateX(-50%);
text-align:center;
width:90%;
opacity:0;
animation:showText 2s forwards;
animation-delay:8s;
}

.message h1{
color:#ffd54f;
font-size:clamp(24px,5vw,52px);
text-shadow:0 0 20px rgba(255,213,79,.8);
margin-bottom:10px;
}

.message p{
color:white;
font-size:clamp(14px,2vw,22px);
}

@keyframes showText{
to{
opacity:1;
}
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="message">
<h1>Good Morning, Devi Ji ☀️</h1>
<p>May your day bloom with happiness and beautiful moments. 💐</p>
</div>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

const flowers=[];
const sparkles=[];

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
createFlowers();
}

window.addEventListener("resize",resize);

class Sunflower{

constructor(x,y,size,delay){
this.x=x;
this.y=y;
this.size=size;
this.delay=delay;
this.progress=0;
}

draw(time){

const t=Math.max(0,time-this.delay);

this.progress=Math.min(t/1500,1);

ctx.strokeStyle="#6ab04c";
ctx.lineWidth=4;

ctx.beginPath();
ctx.moveTo(this.x,canvas.height);

ctx.quadraticCurveTo(
this.x-30,
canvas.height-180,
this.x,
this.y
);

ctx.stroke();

if(this.progress>0.7){

const bloom=(this.progress-0.7)/0.3;

ctx.save();
ctx.translate(this.x,this.y);
ctx.scale(bloom,bloom);

for(let i=0;i<24;i++){

ctx.rotate(Math.PI*2/24);

ctx.fillStyle="#f1c40f";

ctx.beginPath();

ctx.ellipse(
0,
-this.size/2,
10,
28,
0,
0,
Math.PI*2
);

ctx.fill();
}

ctx.fillStyle="#4e342e";

ctx.beginPath();

ctx.arc(
0,
0,
this.size/3,
0,
Math.PI*2
);

ctx.fill();

ctx.restore();
}
}
}

function createFlowers(){

flowers.length=0;

const w=canvas.width;
const h=canvas.height;

flowers.push(
new Sunflower(w*0.30,h*0.52,90,0)
);

flowers.push(
new Sunflower(w*0.50,h*0.42,110,1500)
);

flowers.push(
new Sunflower(w*0.70,h*0.52,90,3000)
);

flowers.push(
new Sunflower(w*0.18,h*0.62,80,4500)
);

flowers.push(
new Sunflower(w*0.82,h*0.62,80,6000)
);
}

resize();

for(let i=0;i<120;i++){

sparkles.push({
x:Math.random()*window.innerWidth,
y:Math.random()*window.innerHeight,
r:Math.random()*2+1,
speed:Math.random()*0.5+0.2
});
}

function drawLeaf(x,y,angle){

ctx.save();

ctx.translate(x,y);
ctx.rotate(angle);

ctx.fillStyle="#2ecc71";

ctx.beginPath();

ctx.moveTo(0,0);
ctx.quadraticCurveTo(25,-15,50,0);
ctx.quadraticCurveTo(25,15,0,0);

ctx.fill();

ctx.restore();
}

let start=null;
function animate(timestamp){

if(!start) start=timestamp;

const elapsed=timestamp-start;

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

// Background Glow

const grad=ctx.createRadialGradient(
canvas.width/2,
canvas.height/2,
50,
canvas.width/2,
canvas.height/2,
800
);

grad.addColorStop(0,"rgba(255,180,0,.08)");
grad.addColorStop(1,"rgba(0,0,0,0)");

ctx.fillStyle=grad;
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

// Sparkles

sparkles.forEach(s=>{

ctx.fillStyle="rgba(255,230,120,.9)";

ctx.beginPath();

ctx.arc(
s.x,
s.y,
s.r,
0,
Math.PI*2
);

ctx.fill();

s.y-=s.speed;

if(s.y<0){

s.y=canvas.height;
s.x=Math.random()*canvas.width;
}
});

// Bouquet Leaves

drawLeaf(
canvas.width*0.35,
canvas.height*0.72,
-0.6
);

drawLeaf(
canvas.width*0.45,
canvas.height*0.78,
0.5
);

drawLeaf(
canvas.width*0.55,
canvas.height*0.72,
-0.5
);

drawLeaf(
canvas.width*0.65,
canvas.height*0.78,
0.6
);

drawLeaf(
canvas.width*0.75,
canvas.height*0.72,
-0.5
);

// Draw Flowers

flowers.forEach(f=>{
f.draw(elapsed);
});

// Floating Glow

ctx.beginPath();

ctx.arc(
canvas.width/2,
canvas.height*0.3,
5,
0,
Math.PI*2
);

ctx.fillStyle="rgba(255,255,180,.9)";
ctx.fill();

requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

</script>

</body>
</html>
